  <text x="62" y="28" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="800" fill="#1a1a1a" letter-spacing="2">VANCOUVER ACTIVITIES</text>
  <!-- Tagline -->
  <text x="62" y="46" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#999" letter-spacing="2.5">YOUR LOCAL GUIDE TO FAMILY FUN</text>
