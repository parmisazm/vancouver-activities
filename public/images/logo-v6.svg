<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 58" width="420" height="58">
  <defs>
    <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6db356"/>
      <stop offset="100%" style="stop-color:#2d5016"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8fd47a"/>
      <stop offset="100%" style="stop-color:#5f8f4a"/>
    </linearGradient>
  </defs>
  <!-- Abstract leaf/compass mark — two overlapping leaves forming a compass shape -->
  <g transform="translate(4, 5)">
    <!-- Leaf 1 — curves right -->
    <path d="M20 0C20 0 40 8 40 24C40 36 28 44 20 44C20 44 20 28 20 0Z" fill="url(#leaf1)" opacity="0.9"/>
    <!-- Leaf 2 — curves left, lighter -->
    <path d="M20 0C20 0 0 8 0 24C0 36 12 44 20 44C20 44 20 28 20 0Z" fill="url(#leaf2)" opacity="0.75"/>
    <!-- Center vein line -->
    <line x1="20" y1="6" x2="20" y2="38" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <!-- Small compass dot -->
    <circle cx="20" cy="14" r="2.5" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- Wordmark -->
  <text x="52" y="30" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="28" letter-spacing="-0.8"><tspan font-weight="800" fill="#1a1a1a">vancouver</tspan><tspan font-weight="300" fill="#3a3a3a">activities</tspan></text>
  <!-- Tagline with elegant spacing -->
  <text x="52" y="47" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="500" fill="#999" letter-spacing="3">EXPLORE</text>
  <text x="110" y="47" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="500" fill="#bbb" letter-spacing="0">—</text>
  <text x="122" y="47" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="500" fill="#999" letter-spacing="3">DISCOVER</text>
  <text x="200" y="47" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="500" fill="#bbb" letter-spacing="0">—</text>
  <text x="212" y="47" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="500" fill="#999" letter-spacing="3">ENJOY</text>
</svg>
